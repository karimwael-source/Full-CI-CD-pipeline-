name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: "Validate - Train and Log to MLflow"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: dvc pull || echo "DVC pull skipped"
        continue-on-error: true

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

      - name: Verify model_info.txt exists
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt was not created"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"

      - name: Upload model_info.txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

  deploy:
    name: "Deploy - Check Threshold and Build Docker"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model_info.txt artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show received Run ID
        run: |
          echo "Received Run ID: $(cat model_info.txt)"

      - name: Check accuracy threshold (must be >= 0.85)
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "=============================================="
          echo "Building Docker image for Run ID: $RUN_ID"
          echo "docker build --build-arg RUN_ID=$RUN_ID -t ml-app:latest ."
          echo "Deployment successful for Run ID: $RUN_ID"
          echo "=============================================="